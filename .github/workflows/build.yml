name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Compilar APK Oficial com Buildozer Action
      # Usa a automação oficial da comunidade Kivy que gere todas as pastas e ferramentas sem erros de diretório
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: stable
        command: android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: |
          bin/*.apk
          .buildozer/**/*.apk
        if-no-files-found: error
