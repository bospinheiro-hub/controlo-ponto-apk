name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11 Estavel Oficial
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        
        # Instala as ferramentas diretamente no ambiente isolado do Python 3.11 configurado
        python3 -m pip install --upgrade pip virtualenv
        python3 -m pip install "buildozer==1.5.0" "cython==0.29.36"

    - name: Compilar APK Sem Conflitos de Host
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # O SEGREDO DEFINITIVO: Força o compilador Android a usar explicitamente o binário do Python 3.11
        # Isso ignora completamente o Python 3.14 global do sistema operativo sem precisar de permissões sudo
        export P4A_hostpython=${{ steps.setup-python.outputs.python-path }}
        
        buildozer android debug
