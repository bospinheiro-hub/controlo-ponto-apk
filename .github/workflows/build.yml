name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # AÇÃO 100% OFICIAL DA ORGANIZAÇÃO KIVY (Configura o ambiente inteiro sem erros de repositório)
    - name: Compilar APK com Kivy Buildozer Action
      uses: kivy/buildozer-action@master
      with:
        command: android debug

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
