name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # Utiliza o ambiente Docker oficial e isolado da organizacao Kivy
    - name: Compilar APK com Kivy Buildozer Action Oficial
      uses: bttmly/buildozer-action@v1
      with:
        command: android debug

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
