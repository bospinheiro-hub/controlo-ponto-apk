name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias Linux e AIDL
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld libffi-dev python3-setuptools libssl-dev build-essential libstdc++6 aidl
        pip install --upgrade pip
        # Instala versões de ferramentas que batem certo com o Buildozer estável
        pip install "buildozer==1.5.0" "cython==0.29.36" virtualenv

    - name: Compilar com Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform/
        # Executa o Buildozer com log simplificado (info) para não estourar o ecrã do GitHub
        yes | buildozer android debug
