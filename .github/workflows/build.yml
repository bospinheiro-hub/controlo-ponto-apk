name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Usa o ambiente Ubuntu estável de compatibilidade retroativa
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Configurar Python 3.9 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar Ferramentas de Compilacao Retroativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        pip install --upgrade pip virtualenv
        # Versões trancadas para o ecossistema da API 28
        pip install "buildozer==1.2.0" "cython==0.29.33"

    - name: Purga e Compilacao do APK Antigo
      run: |
        export PATH=$PATH:~/.local/bin
        
        # Limpeza total de lixo das corridas de 64 bits anteriores
        rm -rf .buildozer
        rm -rf bin
        rm -rf build
        
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        yes | buildozer android debug
        
    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
