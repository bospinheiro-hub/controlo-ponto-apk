name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6
        pip install --upgrade pip
        # Versões trancadas para máxima estabilidade na API 34
        pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform/
        buildozer android clean
        yes | buildozer android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: |
          bin/*.apk
          .buildozer/**/*.apk
        if-no-files-found: error
