name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo6 libncurses6 libncursesw6
        python3 -m pip install --upgrade pip
        python3 -m pip install "buildozer>=1.6.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Buildozer Moderno
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        yes | buildozer android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
