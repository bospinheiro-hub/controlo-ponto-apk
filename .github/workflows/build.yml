name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.10 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Ferramentas de Compilacao e Alinhar Host
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6 libtinfo5 libncurses5 libncursesw5
        
        # ALINHAMENTO DO SISTEMA: Força o Linux do GitHub a usar apenas o Python 3.10 como global
        sudo update-alternatives --install /usr/bin/python3 python3 /opt/hostedtoolcache/Python/3.10.*/x64/bin/python3 10
        sudo update-alternatives --set python3 /opt/hostedtoolcache/Python/3.10.*/x64/bin/python3
        
        python3 --version  # Validação visual no log para confirmar que diz 3.10
        
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        yes | buildozer android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
