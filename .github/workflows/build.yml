name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        python3 -m pip install --upgrade pip virtualenv
        # Atualizado para o Buildozer 1.6.0 para suportar os repositórios de 2026
        python3 -m pip install --user "buildozer>=1.6.0" "cython<3.0.0"

    - name: Compilar APK com Buildozer Nativo
      run: |
        # Expõe o executável do buildozer de forma limpa no sistema do GitHub
        export PATH=$PATH:~/.local/bin
        
        # Limpa as variáveis do runner que colidiam com o compilador do NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        buildozer android debug
