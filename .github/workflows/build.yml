name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # Usa a versão oficial isolada que traz todos os compiladores C++ pré-configurados de fábrica
    - name: Compilar APK com Buildozer Action Oficial
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: stable
        # Correção: Corre apenas o debug puro, sem comandos de clean que apagam diretórios do sistema
        command: android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
