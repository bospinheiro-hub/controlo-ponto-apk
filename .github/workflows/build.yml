name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.10 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Ferramentas de Compilacao
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6 libtinfo5 libncurses5 libncursesw5
        
        # BLINDAGEM DE AMBIENTE: Substitui o binário do sistema pelo Python 3.10 estavel
        sudo rm -f /usr/bin/python3
        sudo ln -s /opt/hostedtoolcache/Python/3.10.*/x64/bin/python3 /usr/bin/python3
        python3 --version
        
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # Adiciona a variavel para o p4a nao procurar o python nativo do host
        export P4A_hostpython=/usr/bin/python3
        
        # Removido o 'yes |' para que se houver um erro, o log mostre exatamente o culpado em vez do Broken Pipe
        buildozer android debug
