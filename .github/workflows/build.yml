name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Forçar Instalação do Python 3.10 Estável no Sistema
      run: |
        sudo add-apt-repository ppa:deadsnakes/ppa -y
        sudo apt-get update
        sudo apt-get install -y python3.10 python3.10-dev python3.10-venv python3.10-distutils

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        
        # Sincroniza o pip global com a nossa versão estável do Python 3.10
        curl -sS https://pypa.io | python3.10
        python3.10 -m pip install --upgrade pip
        python3.10 -m pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Isolamento Rígido de Host
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # O TRUQUE INFALÍVEL: Substitui fisicamente o interpretador global para que o p4a leia apenas o 3.10
        sudo ln -sf /usr/bin/python3.10 /usr/bin/python3
        sudo ln -sf /usr/bin/python3.10 /usr/bin/python
        
        python3 --version  # Vai confirmar no log que o sistema diz "Python 3.10.x"
        yes | buildozer android debug
