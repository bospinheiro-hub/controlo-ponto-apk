name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        pip install --upgrade pip virtualenv
        pip install --user "buildozer>=1.6.0" "cython<3.0.0"

    - name: Purga e Compilacao Limpa do APK
      run: |
        export PATH=$PATH:~/.local/bin
        
        # DESTRUIÇÃO DE CACHE: Garante um ambiente do zero absoluto
        rm -rf .buildozer
        rm -rf bin
        rm -rf build
        
        # ALINHAMENTO FORÇADO DE HOSTPYTHON: Reescreve os links globais do Linux do GitHub Actions
        sudo ln -sf /opt/hostedtoolcache/Python/3.11.*/x64/bin/python3 /usr/bin/python3
        sudo ln -sf /opt/hostedtoolcache/Python/3.11.*/x64/bin/python3 /usr/local/bin/python3
        sudo ln -sf /opt/hostedtoolcache/Python/3.11.*/x64/bin/python /usr/bin/python
        
        # Validação visual no log (Vai mostrar Python 3.11.x)
        python3 --version
        
        # Limpa as variáveis do runner que colidiam com o compilador do NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        export P4A_hostpython=/usr/bin/python3
        
        buildozer android debug
