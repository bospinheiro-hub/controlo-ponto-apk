name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Java 17 (Obrigatorio para o Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao do Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6
        pip install --upgrade pip
        # Instalamos o Buildozer e o Cython nas versões de estabilidade total
        pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK com Buildozer
      run: |
        # Criamos as pastas manualmente para evitar o erro de FileNotFoundError
        mkdir -p ~/.buildozer/android/platform/
        # Inicia a compilação diretamente injetando a resposta sim
        yes | buildozer android debug
