name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # Ação oficial estável v2 que cria um ecossistema Docker imune ao Python do host
    - name: Compilar APK com Buildozer Action Oficial Stable
      uses: ArtemSBulgakov/buildozer-action@v2
      with:
        buildozer_version: stable
        command: android debug
        # Força o sistema a reconstruir o motor p4a do zero sem lixo de cache antiga
        repository_cache: false
        p4a_cache: false

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
