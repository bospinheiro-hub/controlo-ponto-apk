name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # Ação oficial Kivy atualizada para 2026 (isola caminhos e evita o Broken Pipe do NDK)
    - name: Compilar APK com Buildozer Action Oficial
      uses: ArtemSBulgakov/buildozer-action@v3
      with:
        buildozer_version: stable
        command: android debug

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
