name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Compilar APK via Docker Isolado
      # Corrigido para o repositório oficial atualizado do autor
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: stable
        command: android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
