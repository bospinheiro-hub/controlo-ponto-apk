name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11 Fixo
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao Nativas
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libsqlite3-dev lld unzip zip aidl libstdc++6 \
          libtinfo5 libncurses5 libncursesw5
        python3 -m pip install --upgrade pip virtualenv

    - name: Compilar APK com Isolamento de Host
      run: |
        # BLINDAGEM MÁXIMA: Cria um ambiente virtual puro e tranca as ferramentas lá dentro
        python3 -m venv venv_build
        source venv/bin/activate || source venv_build/bin/activate
        pip install "buildozer==1.5.0" "cython==0.29.36"
        
        # Remove lixo do GitHub Actions que baralha o NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # Força o p4a a usar exclusivamente o Python 3.11 do ambiente virtual ativo
        export P4A_hostpython=$(which python3)
        
        buildozer android debug
        deactivate
