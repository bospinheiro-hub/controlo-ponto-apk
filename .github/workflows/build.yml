name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias Linux e AIDL
      run: |
        sudo apt-get update
        # Instala as ferramentas de compilação essenciais e o pacote nativo aidl
        sudo apt-get install -y libsqlite3-dev lld libffi-dev python3-setuptools libssl-dev build-essential libstdc++6 aidl
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compilar com Buildozer e Forçar Aceitação de Licenças
      run: |
        # Cria a pasta de destino do SDK antecipadamente para injetar as licenças aceites
        mkdir -p ~/.buildozer/android/platform/
        
        # Executa o Buildozer injetando a resposta "yes" automaticamente para os prompts do SDKmanager da Google
        yes | buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"
