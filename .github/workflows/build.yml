name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Ferramentas de Compilacao
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6 libtinfo5 libncurses5 libncursesw5
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython==0.29.36" virtualenv

    - name: Compilar APK Sem Conflito de Host
      run: |
        export PATH=$PATH:~/.local/bin
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # O TRUQUE DE RETALHO DEFINITIVO: Sobreescreve o executável padrão do sistema para enganar o P4A
        sudo ln -sf /opt/hostedtoolcache/Python/3.11.*/x64/bin/python3 /usr/bin/python3
        sudo ln -sf /opt/hostedtoolcache/Python/3.11.*/x64/bin/python3 /usr/bin/python
        
        python3 --version
        yes | buildozer android debug
