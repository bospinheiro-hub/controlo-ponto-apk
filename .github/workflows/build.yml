name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependencias do Sistema do Android NDK
      run: |
        sudo apt-get update
        # Instalação das bibliotecas e compiladores de linkagem 32/64 bits exigidas em 2026
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libtool \
          pkg-config autoconf automake libpython3-dev libsqlite3-dev \
          lld unzip zip aidl libstdc++6 libtinfo5 libncurses5 libncursesw5 \
          lib32z1 lib32stdc++6
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Compilar APK sem Conflitos de Rede
      run: |
        # Purga total de caminhos virtuais que baralham o instalador do Linux
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        mkdir -p ~/.buildozer/android/platform/
        yes | buildozer android debug

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
