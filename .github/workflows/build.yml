name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python do Sistema
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependencias Linux e AIDL
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld libffi-dev python3-setuptools libssl-dev build-essential libstdc++6 aidl
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compilar APK Limpo
      run: |
        # Executa uma limpeza total antes para eliminar rastros de erros passados
        buildozer android clean
        mkdir -p ~/.buildozer/android/platform/
        yes | buildozer android debug

    - name: Enviar Ficheiro APK Final
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
