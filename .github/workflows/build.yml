name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld libffi-dev python3-setuptools libssl-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compilar com Buildozer
      run: |
        # Executa em modo simples para não truncar o log com lixo visual
        buildozer android debug
