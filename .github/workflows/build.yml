name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Codigo
      uses: actions/checkout@v4

    # Usa a imagem Docker oficial do Buildozer que traz o Python 3.11 trancado de fábrica na raiz
    - name: Compilar APK com Buildozer Action Oficial
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: stable
        command: android debug

    - name: Enviar Ficheiro APK Final para Download
      uses: actions/upload-artifact@v4
      with:
        name: Ponto-APK
        path: bin/*.apk
        if-no-files-found: error
